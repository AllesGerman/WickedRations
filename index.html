<!DOCTYPE html>
<html lang="en">
<head>
<!--
  dizzard...
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ENT_2</title>
<style>
  :root{
    --void:#000000;
    --rust:#3a1414;
    --moss:#3d3a15;
    --ash:#b4ac9c;
    --signal:#7a1f1f;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    width:100%; height:100%;
    background:var(--void);
    overflow:hidden;
    cursor:default;
  }

  @font-face{
    font-family:'VT323';
    src: local('VT323');
  }

  body{
    font-family:'VT323', 'Courier New', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, var(--void) 72%);
  }

  /* the frame */
  .frame{
    position:relative;
    max-width:min(72vh, 92vw);
    max-height:88vh;
    filter: contrast(1.08) saturate(1.05) brightness(0.98);
  }

  .frame img{
    display:block;
    width:100%;
    height:auto;
    image-rendering: pixelated;
    animation: breathe 11s ease-in-out infinite;
  }

  @keyframes breathe{
    0%, 100% { filter: brightness(0.94) contrast(1); }
    45%      { filter: brightness(1.06) contrast(1.04); }
    50%      { filter: brightness(1.1) contrast(1.06); }
    55%      { filter: brightness(1.06) contrast(1.04); }
  }

  /* chromatic aberration ghosting, very subtle */
  .frame::before,
  .frame::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: var(--img-url);
    background-size:cover;
    mix-blend-mode: screen;
    opacity:0.05;
    pointer-events:none;
  }
  .frame::before{ transform:translate(1.5px,0); background:linear-gradient(rgba(120,20,20,0.35),rgba(120,20,20,0.35)); mix-blend-mode:overlay; }
  .frame::after{ transform:translate(-1.5px,0); background:linear-gradient(rgba(20,60,90,0.25),rgba(20,60,90,0.25)); mix-blend-mode:overlay; }

  /* scanlines */
  .scanlines{
    position:absolute; inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.0) 0px,
      rgba(0,0,0,0.18) 1px,
      rgba(0,0,0,0.0) 2px
    );
    mix-blend-mode:multiply;
    z-index:5;
  }

  /* vignette */
  .vignette{
    position:absolute; inset:0;
    pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 45%, rgba(0,0,0,0.85) 100%);
    z-index:6;
  }

  /* grain */
  .grain{
    position:absolute; inset:-2%;
    pointer-events:none;
    opacity:0.09;
    mix-blend-mode:overlay;
    background-repeat:repeat;
    z-index:4;
    animation: grainshift 0.4s steps(4) infinite;
  }
  @keyframes grainshift{
    0%{ transform:translate(0,0); }
    25%{ transform:translate(-1%,1%); }
    50%{ transform:translate(1%,-1%); }
    75%{ transform:translate(-1%,-1%); }
    100%{ transform:translate(0,0); }
  }

  /* tracking glitch sweep */
  .tracking{
    position:absolute;
    left:0; right:0;
    height:0px;
    background: rgba(180,172,156,0.06);
    box-shadow: 0 0 12px 2px rgba(180,172,156,0.08);
    z-index:7;
    pointer-events:none;
    opacity:0;
  }
  .tracking.run{
    animation: sweep 6.5s cubic-bezier(.3,0,.7,1) forwards;
  }
  @keyframes sweep{
    0%   { top:-4%; height:0px; opacity:0; }
    4%   { opacity:0.9; height:14px; }
    50%  { top:52%; height:20px; opacity:0.7; }
    92%  { opacity:0.9; height:10px; }
    100% { top:104%; height:0px; opacity:0; }
  }

  /* rec indicator */
  .hud{
    position:fixed;
    left:22px; bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--ash);
    font-size:20px;
    letter-spacing:1px;
    opacity:0.75;
    z-index:10;
    user-select:none;
  }
  .dot{
    width:10px; height:10px;
    border-radius:50%;
    background:var(--signal);
    animation: blink 1.1s steps(1) infinite;
    box-shadow: 0 0 6px 1px rgba(122,31,31,0.6);
  }
  @keyframes blink{
    0%, 55%{ opacity:1; }
    56%, 100%{ opacity:0.15; }
  }

  .timestamp{
    position:fixed;
    right:22px; bottom:20px;
    color:var(--ash);
    font-size:20px;
    letter-spacing:1px;
    opacity:0.6;
    z-index:10;
    user-select:none;
  }

  .corner-tl{
    position:fixed; top:18px; left:22px;
    color:var(--ash);
    font-size:18px;
    opacity:0.35;
    letter-spacing:2px;
    z-index:10;
    user-select:none;
  }

  .signal{
    position:fixed;
    top:18px; right:22px;
    color:var(--ash);
    font-size:18px;
    letter-spacing:1px;
    opacity:0.4;
    z-index:10;
    user-select:none;
    cursor:pointer;
    transition:opacity 1.2s ease;
  }
  .signal.playing{
    opacity:0.22;
    animation: signalpulse 3.2s ease-in-out infinite;
  }
  .signal.hidden{
    opacity:0;
    pointer-events:none;
  }
  @keyframes signalpulse{
    0%, 100%{ opacity:0.14; }
    50%{ opacity:0.3; }
  }

  ::selection{ background:var(--rust); color:var(--ash); }
</style>
</head>
