<!DOCTYPE html>
<html lang="en">
<head>
<!--
  dizzard...
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ENT_2</title>
<style>
  :root{
    --void:#000000;
    --rust:#3a1414;
    --moss:#3d3a15;
    --ash:#b4ac9c;
    --signal:#7a1f1f;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    width:100%; height:100%;
    background:var(--void);
    overflow:hidden;
    cursor:default;
  }

  @font-face{
    font-family:'VT323';
    src: local('VT323');
  }

  body{
    font-family:'VT323', 'Courier New', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, var(--void) 72%);
  }

  /* the frame */
  .frame{
    position:relative;
    max-width:min(72vh, 92vw);
    max-height:88vh;
    filter: contrast(1.08) saturate(1.05) brightness(0.98);
  }

  .frame img{
    display:block;
    width:100%;
    height:auto;
    image-rendering: pixelated;
    animation: breathe 11s ease-in-out infinite;
  }

  @keyframes breathe{
    0%, 100% { filter: brightness(0.94) contrast(1); }
    45%      { filter: brightness(1.06) contrast(1.04); }
    50%      { filter: brightness(1.1) contrast(1.06); }
    55%      { filter: brightness(1.06) contrast(1.04); }
  }

  /* chromatic aberration ghosting, very subtle */
  .frame::before,
  .frame::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: var(--img-url);
    background-size:cover;
    mix-blend-mode: screen;
    opacity:0.05;
    pointer-events:none;
  }
  .frame::before{ transform:translate(1.5px,0); background:linear-gradient(rgba(120,20,20,0.35),rgba(120,20,20,0.35)); mix-blend-mode:overlay; }
  .frame::after{ transform:translate(-1.5px,0); background:linear-gradient(rgba(20,60,90,0.25),rgba(20,60,90,0.25)); mix-blend-mode:overlay; }

  /* scanlines */
  .scanlines{
    position:absolute; inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.0) 0px,
      rgba(0,0,0,0.18) 1px,
      rgba(0,0,0,0.0) 2px
    );
    mix-blend-mode:multiply;
    z-index:5;
  }

  /* vignette */
  .vignette{
    position:absolute; inset:0;
    pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 45%, rgba(0,0,0,0.85) 100%);
    z-index:6;
  }

  /* grain */
  .grain{
    position:absolute; inset:-2%;
    pointer-events:none;
    opacity:0.09;
    mix-blend-mode:overlay;
    background-repeat:repeat;
    z-index:4;
    animation: grainshift 0.4s steps(4) infinite;
  }
  @keyframes grainshift{
    0%{ transform:translate(0,0); }
    25%{ transform:translate(-1%,1%); }
    50%{ transform:translate(1%,-1%); }
    75%{ transform:translate(-1%,-1%); }
    100%{ transform:translate(0,0); }
  }

  /* tracking glitch sweep */
  .tracking{
    position:absolute;
    left:0; right:0;
    height:0px;
    background: rgba(180,172,156,0.06);
    box-shadow: 0 0 12px 2px rgba(180,172,156,0.08);
    z-index:7;
    pointer-events:none;
    opacity:0;
  }
  .tracking.run{
    animation: sweep 6.5s cubic-bezier(.3,0,.7,1) forwards;
  }
  @keyframes sweep{
    0%   { top:-4%; height:0px; opacity:0; }
    4%   { opacity:0.9; height:14px; }
    50%  { top:52%; height:20px; opacity:0.7; }
    92%  { opacity:0.9; height:10px; }
    100% { top:104%; height:0px; opacity:0; }
  }

  /* rec indicator */
  .hud{
    position:fixed;
    left:22px; bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--ash);
    font-size:20px;
    letter-spacing:1px;
    opacity:0.75;
    z-index:10;
    user-select:none;
  }
  .dot{
    width:10px; height:10px;
    border-radius:50%;
    background:var(--signal);
    animation: blink 1.1s steps(1) infinite;
    box-shadow: 0 0 6px 1px rgba(122,31,31,0.6);
  }
  @keyframes blink{
    0%, 55%{ opacity:1; }
    56%, 100%{ opacity:0.15; }
  }

  .timestamp{
    position:fixed;
    right:22px; bottom:20px;
    color:var(--ash);
    font-size:20px;
    letter-spacing:1px;
    opacity:0.6;
    z-index:10;
    user-select:none;
  }

  .corner-tl{
    position:fixed; top:18px; left:22px;
    color:var(--ash);
    font-size:18px;
    opacity:0.35;
    letter-spacing:2px;
    z-index:10;
    user-select:none;
  }

  .signal{
    position:fixed;
    top:18px; right:22px;
    color:var(--ash);
    font-size:18px;
    letter-spacing:1px;
    opacity:0.4;
    z-index:10;
    user-select:none;
    cursor:pointer;
    transition:opacity 1.2s ease;
  }
  .signal.playing{
    opacity:0.22;
    animation: signalpulse 3.2s ease-in-out infinite;
  }
  .signal.hidden{
    opacity:0;
    pointer-events:none;
  }
  @keyframes signalpulse{
    0%, 100%{ opacity:0.14; }
    50%{ opacity:0.3; }
  }

  ::selection{ background:var(--rust); color:var(--ash); }
</style>
</head>
<body>

<div class="stage">
  <div class="frame" id="frame">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAvsAAAL+CAYAAAAzTNv9AAAQAElEQVR4Aey9MXudx5Kt089NiEw7kzIrs7OZ7Nz/n91wsplsnMkZnMHRPe+7uqvRexOkCQoECbDm6epatWpV9fcVQO8GRGn+nzHG/9/WM+jvgf4e6O+B[...]
    <div class="grain" id="grain"></div>
    <div class="scanlines"></div>
    <div class="tracking" id="tracking"></div>
    <div class="vignette"></div>
  </div>
</div>

<div class="corner-tl">ENT_2 · WICKED&nbsp;RATIONS</div>
<div class="hud"><span class="dot"></span><span>REC</span></div>
<div class="timestamp" id="clock">00:00:00</div>
<div class="signal" id="signal">SIGNAL&nbsp;·&nbsp;click&nbsp;to&nbsp;listen</div>

<div id="accessBox" style="position: fixed; top: 60px; left: 50%; transform: translateX(-50%); color: #000; font-family: 'VT323', 'Courier New', monospace; border: 1px solid #fff; padding: 16px; background: #fff;">
  <div style="font-size: 12px; letter-spacing: 1px; margin-bottom: 10px; text-align: center; color: #000;">ACCESS CODE</div>
  <input type="text" id="codeInput" placeholder="enter code..." autocomplete="off" spellcheck="false" style="width: 100%; background: #fff; border: 1px solid #000; color: #000; font-family: inherit; font-weight: bold; padding: 8px; letter-spacing: 1px;">
  <button onclick="checkAccessCode()" style="width: 100%; background: #fff; color: #000; border: 1px solid #000; font-family: inherit; font-weight: bold; padding: 8px; cursor: pointer; letter-spacing: 1px; margin-top: 10px;">SUBMIT</button>
  <div id="accessMsg" style="font-size: 11px; margin-top: 8px; min-height: 14px; color: #000; text-align: center;"></div>
</div>

<audio id="tape" src="" loop preload="auto" style="display:none;"></audio>

<!-- KEYBOARD SOUND EFFECTS -->
<audio id="keySound1" src="key.mp3" preload="auto"></audio>
<!-- ACCESS SOUND EFFECTS -->
<audio id="TRUE" src="true.mp3" preload="auto"></audio>
<audio id="FALSE" src="false.mp3" preload="auto"></audio>

<script>
  // grain texture via inline svg turbulence, generated once
  (function(){
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>
      <filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter>
      <rect width='100%' height='100%' filter='url(%23n)'/>
    </svg>`;
    document.getElementById('grain').style.backgroundImage =
      "url(\"data:image/svg+xml;utf8," + encodeURIComponent(svg) + "\")";
  })();

  // corrupted timestamp — mostly stable, occasionally glitches
  (function(){
    const el = document.getElementById('clock');
    let base = Date.now() - Math.floor(Math.random()*999*1000);
    function fmt(n){ return n.toString().padStart(2,'0'); }
    function tick(){
      const glitch = Math.random() < 0.06;
      if(glitch){
        const g = () => Math.floor(Math.random()*90+9);
        el.textContent = `${fmt(g())}:${fmt(g())}:${fmt(g())}`;
        el.style.opacity = 0.9;
      } else {
        const d = new Date(base);
        el.textContent = `${fmt(d.getUTCHours())}:${fmt(d.getUTCMinutes())}:${fmt(d.getUTCSeconds())}`;
        el.style.opacity = 0.6;
        base += 1000;
      }
    }
    tick();
    setInterval(tick, 1000);
  })();

  // tape loop — starts on first interaction (browsers block audio-with-sound otherwise)
  (function(){
    const tape = document.getElementById('tape');
    const signal = document.getElementById('signal');
    tape.volume = 0.55;
    let started = false;

    function start(){
      if(started) return;
      started = true;
      tape.play().then(() => {
        signal.textContent = 'SIGNAL';
        signal.classList.add('playing');
      }).catch(() => {
        started = false; // playback blocked, allow retry on next click
      });
    }

    document.addEventListener('click', start, { once:false });
    document.addEventListener('keydown', start, { once:true });
  })();

  // occasional vhs tracking sweep
  (function(){
    const t = document.getElementById('tracking');
    function trigger(){
      t.classList.remove('run');
      void t.offsetWidth;
      t.classList.add('run');
      setTimeout(trigger, 9000 + Math.random()*14000);
    }
    setTimeout(trigger, 4000 + Math.random()*4000);
  })();

  // ACCESS CODE LOGIC
  const VALID_CODE_B64 = "QWRhbQ==";
  const sounds = ['keySound1'];
  
  window.checkAccessCode = function() {
    const input = document.getElementById('codeInput').value.trim();
    const msg = document.getElementById('accessMsg');
    let decoded = "";
    try { decoded = atob(input); } catch (e) { decoded = ""; }
    
    if (input === VALID_CODE_B64 || decoded === atob(VALID_CODE_B64)) {
      msg.textContent = "ACCEPTABLE";
      msg.style.color = "#0f0";
      const soundId = 'TRUE';
      const audio = document.getElementById(soundId);
      audio.play().catch(() => {});
      audio.currentTime = 0;
      sessionStorage.setItem('wr_access', 'granted');
      setTimeout(() => {
        window.location.href = "archive.html";
      }, 600);
    } else {
      msg.textContent = "INVALID ACCESS";
      msg.style.color = "#f00";
      const soundId = 'FALSE';
      const audio = document.getElementById(soundId);
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }
  };
  
  // Keyboard sound effects for code input
  document.getElementById('codeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      checkAccessCode();
    } else {
      // Play random sound at random pitch
      const soundId = 'keySound1';
      const audio = document.getElementById(soundId);
      audio.currentTime = 0;
      // Random playback rate for pitch variation
      audio.playbackRate = 0.8 + Math.random() * 0.4; // 0.8 to 1.2
      audio.play().catch(() => {}); // Silent fail if audio can't play
    }
  });
</script>

</body>
</html>
